<!DOCTYPE html>

  <style>

    .title { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem,4.5vw,2.2rem); font-weight: 700; color: var(--brown); margin-bottom: 16px; line-height: 1.3; }

    .btn:hover { background: #3a8f52; transform: translateY(-2px); }
    .note { margin-top: 24px; font-size: 0.82rem; font-weight: 300; color: rgba(59,35,16,0.45); line-height: 1.9; }
    .note a { color: var(--amber); }
  </style>
