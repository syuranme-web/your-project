<!-- ============================================================
     success.html — 決済完了ページ
     配置場所: public/success.html
============================================================ -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご注文ありがとうございます — 東欧のキッチン</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --amber:#C8862A; --amber-lt:#E5A84A; --cream:#F5EDD8; --brown:#3B2310; --brown-md:#5C3A1E; --cta-green:#2a6e3f; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Serif JP', serif; color: var(--brown); background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 24px; animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,5vw,2.6rem); font-weight: 700; color: var(--brown); margin-bottom: 16px; line-height: 1.3; }
    .title em { font-style: italic; color: var(--amber); }
    .body-text { font-size: 0.95rem; font-weight: 300; line-height: 2.0; color: var(--brown-md); max-width: 480px; margin-bottom: 36px; }
    .info-box { background: #fff; border: 1px solid rgba(200,134,42,0.20); border-radius: 10px; padding: 24px 28px; max-width: 480px; width: 100%; margin-bottom: 32px; text-align: left; }
    .info-box h3 { font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--amber); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
    .info-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(59,35,16,0.06); font-size: 0.86rem; }
    .info-row:last-child { border-bottom: none; }
    .info-row__label { color: var(--brown-md); font-weight: 300; }
    .info-row__value { font-weight: 500; color: var(--brown); }
    .note { font-size: 0.82rem; font-weight: 300; color: rgba(59,35,16,0.50); max-width: 420px; line-height: 1.9; margin-bottom: 32px; }
    .note a { color: var(--amber); }
    .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Noto Serif JP', serif; font-size: 1rem; font-weight: 500; color: #fff; background: var(--cta-green); text-decoration: none; padding: 16px 40px; border-radius: 6px; transition: all 0.3s; box-shadow: 0 6px 24px rgba(42,110,63,0.35); }
    .btn:hover { background: #3a8f52; transform: translateY(-2px); }
    .loading { font-size: 0.82rem; color: rgba(59,35,16,0.38); margin-top: 16px; }
  </style>
</head>
<body>
  <div class="icon">🎉</div>
  <h1 class="title">ご注文<em>ありがとうございます</em></h1>
  <p class="body-text">お支払いが完了しました。<br>ご登録のメールアドレスに確認メールをお送りしております。</p>

  <div class="info-box" id="infoBox" style="display:none">
    <h3>ご注文情報</h3>
    <div id="infoRows"></div>
  </div>

  <p class="note">
    商品はご注文確認後、3〜5営業日以内に冷凍クール便にてお届けいたします。<br>
    ご不明な点は <a href="mailto:touounokitchen@gmail.com">touounokitchen@gmail.com</a> までお問い合わせください。<br>
    <small>（サポート：平日 10:00〜17:00）</small>
  </p>

  <a href="/" class="btn">← ショップトップへ戻る</a>
  <p class="loading" id="loadingMsg">注文情報を確認中...</p>

  <script>
    (async () => {
      const params    = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const loadEl    = document.getElementById('loadingMsg');
      if (!sessionId) { loadEl.style.display = 'none'; return; }
      try {
        const res  = await fetch(`/api/session-result?session_id=${sessionId}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const rows = [
          { label: 'お名前',       value: data.customerName  || '—' },
          { label: 'メール',       value: data.customerEmail || '—' },
          { label: 'お支払い金額', value: data.amountTotal != null ? `¥${data.amountTotal.toLocaleString()}（税込）` : '—' },
          { label: 'ステータス',   value: data.status === 'paid' ? '✅ 決済完了' : data.status },
        ];
        document.getElementById('infoRows').innerHTML = rows.map(r =>
          `<div class="info-row"><span class="info-row__label">${r.label}</span><span class="info-row__value">${r.value}</span></div>`
        ).join('');
        document.getElementById('infoBox').style.display = 'block';
        loadEl.style.display = 'none';
      } catch (e) {
        loadEl.textContent = '注文情報の取得をスキップしました。';
      }
    })();
  </script>
</body>
</html>
